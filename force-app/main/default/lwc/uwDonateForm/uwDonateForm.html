<template>
    <div class="donate-wrapper">

        <!-- Header -->
        <div class="donate-header">
            <a href="/portal" class="brand-link">
                <span class="brand-name">United Way</span>
                <span class="brand-divider">|</span>
                <span class="brand-portal">Community Portal</span>
            </a>
        </div>

        <!-- Success screen -->
        <template if:true={isSuccess}>
            <div class="success-screen">
                <div class="success-icon">&#10003;</div>
                <h2>Thank You, {firstName}!</h2>
                <p>Your <strong>{frequency}</strong> donation of <strong>${amount}</strong> has been recorded.</p>
                <p>A confirmation will be sent to <strong>{email}</strong>.</p>
                <a href="/portal" class="btn-action">Return to Portal</a>
            </div>
        </template>

        <template if:false={isSuccess}>
            <!-- Progress bar -->
            <div class="progress-track">
                <div class={step1Cls}>
                    <div class="step-circle">1</div>
                    <div class="step-label">YOUR GIFT</div>
                </div>
                <div class={prog1Cls}></div>
                <div class={step2Cls}>
                    <div class="step-circle">2</div>
                    <div class="step-label">DONOR INFORMATION</div>
                </div>
                <div class={prog2Cls}></div>
                <div class={step3Cls}>
                    <div class="step-circle">3</div>
                    <div class="step-label">PAYMENT</div>
                </div>
            </div>

            <div class="form-body">
                <!-- Main form -->
                <div class="form-main">

                    <!-- Step 1: Your Gift -->
                    <template if:true={isStep1}>
                        <h2>You're making a difference</h2>
                        <p class="step-sub">Choose your donation frequency and amount</p>

                        <div class="frequency-tabs">
                            <button class={oneTimeCls} onclick={setOneTime}>One Time</button>
                            <button class={monthlyCls} onclick={setMonthly}>Monthly</button>
                        </div>

                        <div class="amount-grid">
                            <button class={amt50Cls}   onclick={pickAmount} data-val="50">$50</button>
                            <button class={amt100Cls}  onclick={pickAmount} data-val="100">$100</button>
                            <button class={amt365Cls}  onclick={pickAmount} data-val="365">$365</button>
                            <button class={amt1200Cls} onclick={pickAmount} data-val="1200">$1,200</button>
                        </div>

                        <div class="form-group">
                            <label>Other Amount</label>
                            <div class="input-with-prefix">
                                <span class="prefix">$</span>
                                <input type="number" min="1" placeholder="Enter amount"
                                    value={customAmount} onchange={handleCustomAmount} />
                            </div>
                        </div>

                        <template if:true={step1Error}>
                            <p class="field-error">{step1Error}</p>
                        </template>
                        <button class="btn-action" onclick={nextStep}>Next &#8594;</button>
                    </template>

                    <!-- Step 2: Donor Info -->
                    <template if:true={isStep2}>
                        <h2>Your information</h2>
                        <p class="step-sub">Tell us a little about yourself</p>

                        <div class="form-row">
                            <div class="form-group">
                                <label>First Name *</label>
                                <input type="text" value={firstName} onchange={handleFirstName} placeholder="First name" />
                            </div>
                            <div class="form-group">
                                <label>Last Name *</label>
                                <input type="text" value={lastName} onchange={handleLastName} placeholder="Last name" />
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Email *</label>
                                <input type="email" value={email} onchange={handleEmail} placeholder="your@email.com" />
                            </div>
                            <div class="form-group">
                                <label>Phone (optional)</label>
                                <input type="tel" value={phone} onchange={handlePhone} placeholder="+1 (xxx) xxx-xxxx" />
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Street Address</label>
                            <input type="text" value={address} onchange={handleAddress} placeholder="Enter your address" />
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>City</label>
                                <input type="text" value={city} onchange={handleCity} placeholder="City" />
                            </div>
                            <div class="form-group">
                                <label>Postal Code</label>
                                <input type="text" value={postalCode} onchange={handlePostalCode} placeholder="Postal Code" />
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Country</label>
                            <select onchange={handleCountry}>
                                <option value="Canada">Canada</option>
                                <option value="United States">United States</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>

                        <template if:true={step2Error}>
                            <p class="field-error">{step2Error}</p>
                        </template>
                        <div class="btn-row">
                            <button class="btn-back" onclick={prevStep}>&#8592; Back</button>
                            <button class="btn-action" onclick={nextStep}>Next &#8594;</button>
                        </div>
                    </template>

                    <!-- Step 3: Payment -->
                    <template if:true={isStep3}>
                        <h2>Review &amp; Complete</h2>
                        <p class="step-sub">Please review your donation details</p>

                        <div class="review-card">
                            <div class="review-row">
                                <span class="review-label">Donation Type</span>
                                <span class="review-value">{frequency}</span>
                            </div>
                            <div class="review-row">
                                <span class="review-label">Amount</span>
                                <span class="review-value review-amount">${amount}</span>
                            </div>
                            <div class="review-row">
                                <span class="review-label">Name</span>
                                <span class="review-value">{fullName}</span>
                            </div>
                            <div class="review-row">
                                <span class="review-label">Email</span>
                                <span class="review-value">{email}</span>
                            </div>
                        </div>

                        <template if:true={submitError}>
                            <p class="field-error">{submitError}</p>
                        </template>
                        <div class="btn-row">
                            <button class="btn-back" onclick={prevStep}>&#8592; Back</button>
                            <button class="btn-pay" onclick={handleSubmit} disabled={isLoading}>{payLabel}</button>
                        </div>
                    </template>

                </div>

                <!-- Sidebar -->
                <div class="form-sidebar">
                    <div class="sidebar-card">
                        <div class="sidebar-title">Your Donation</div>
                        <div class="sidebar-amount">${amount}</div>
                        <div class="sidebar-freq">{frequency}</div>
                        <div class="sidebar-divider"></div>
                        <p class="sidebar-msg">Thank you for selecting a <strong>{frequency}</strong> donation of <strong>${amount}</strong>.</p>
                        <p class="sidebar-msg">Your donation stays 100% local, connects people to the opportunities they need to thrive, and helps build strong and inclusive communities.</p>
                    </div>
                </div>
            </div>
        </template>

    </div>
</template>
