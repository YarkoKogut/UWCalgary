<template>
    <div class="login-page">
        <div class="login-left">
            <a href="/portal" class="brand-link">
                <span class="brand-name">United Way</span>
                <span class="brand-sub">Community Support Portal</span>
            </a>
            <p class="brand-tagline">Connecting individuals and families with the programs and services they need most.</p>
            <div class="brand-badge">Trusted Community Support Since 1917</div>
        </div>

        <div class="login-right">
            <div class="login-card">
                <h2>Sign In</h2>
                <p class="login-sub">Access your support portal account</p>

                <template if:true={error}>
                    <div class="error-box">{error}</div>
                </template>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" value={username} onchange={handleUsername} placeholder="your@email.com" />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" value={password} onchange={handlePassword} placeholder="••••••••" />
                </div>

                <button class="btn-login" onclick={handleLogin} disabled={isLoading}>
                    {loginLabel}
                </button>

                <div class="login-footer">
                    <span>Don't have an account?</span>
                    <a href="/portal/SelfRegister">Register</a>
                </div>
            </div>
        </div>
    </div>
</template>
